global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    app: "orizon"
    environment: "development"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # A API expõe métricas em /metrics via OpenTelemetry
  - job_name: "orizon-api"
    static_configs:
      - targets: ["host.docker.internal:5000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # O Worker expõe métricas em /metrics via OpenTelemetry
  - job_name: "orizon-worker"
    static_configs:
      - targets: ["host.docker.internal:5001"]
    metrics_path: "/metrics"
    scrape_interval: 15s